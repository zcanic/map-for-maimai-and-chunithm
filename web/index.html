<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>maimai / CHUNITHM 店铺地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">Arcade Map</div>
        <div class="subtitle">maimai DX · CHUNITHM · 全国店铺地图</div>
      </div>
      <div class="header-right">
        <div class="status">
          <span class="status-dot"></span>
          数据来源：Wahlap + 高德地图
        </div>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <section class="card">
          <h3>筛选条件</h3>
          <div class="filter">
            <label>游戏类型</label>
            <select id="gameFilter">
              <option value="all">全部</option>
              <option value="maimai">仅 maimai DX</option>
              <option value="chunithm">仅 CHUNITHM</option>
              <option value="both">同时有两种</option>
            </select>
          </div>
          <div class="filter">
            <label>省份</label>
            <select id="provinceFilter">
              <option value="all">全部省份</option>
            </select>
          </div>
          <div class="filter">
            <label>评分（高德）</label>
            <select id="ratingFilter">
              <option value="all">全部</option>
              <option value="4.5">≥ 4.5</option>
              <option value="4.0">≥ 4.0</option>
              <option value="3.5">≥ 3.5</option>
            </select>
          </div>
        </section>

        <section class="card stats">
          <h3>总览</h3>
          <div class="stat">
            <span class="stat-label">总店铺</span>
            <span class="stat-value" id="statTotal">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">maimai DX</span>
            <span class="stat-value" id="statMaimai">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">CHUNITHM</span>
            <span class="stat-value" id="statChunithm">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">双机厅</span>
            <span class="stat-value" id="statBoth">-</span>
          </div>
        </section>

        <section class="card list">
          <h3>店铺列表</h3>
          <div id="shopList"></div>
        </section>
      </aside>

      <section class="map-panel">
        <div id="map"></div>
        <div class="legend">
          <div><span class="dot maimai"></span> maimai DX</div>
          <div><span class="dot chunithm"></span> CHUNITHM</div>
          <div><span class="dot both"></span> 两种都有</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
