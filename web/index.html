<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta property="og:description" content="全国 3000+ maimai / CHUNITHM 机厅，支持城市、省份筛选、评分查看与一键导航。" />

  <meta name="twitter:image" content="https://arcademap.top/og-cover.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "舞萌中二地图 — maimai / CHUNITHM 机厅查询",
    "url": "https://arcademap.top/",
    "description": "舞萌中二地图：全国 maimai / CHUNITHM 机厅查询，覆盖 3000+ 门店",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Web",
    "inLanguage": "zh-CN",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CNY" }
  }
  </script>

  <link rel="preload" href="data/locations.js" as="script" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="舞萌中二地图" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite" aria-label="正在加载">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载店铺数据…</div>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">舞萌中二地图</div>
        <div class="subtitle">maimai · CHUNITHM · 全国店铺地图</div>
      </div>
      <div class="header-right">
        <!-- 附近机厅按钮 -->
        <button id="locateBtn" class="locate-btn" title="找附近机厅" aria-label="找附近机厅" aria-pressed="false">
          <span class="locate-icon">📍</span>
          <span class="locate-label">附近机厅</span>
        </button>
        <div class="status">
          <span class="status-dot"></span>
          数据来源：Wahlap + 高德地图
        </div>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar" id="sidebar">
        <!-- 移动端拖拽把手 -->
        <div class="drawer-handle" id="drawerHandle">
          <div class="drawer-handle-bar"></div>
        </div>

        <!-- Search -->
        <section class="card">
          <h3>搜索店铺</h3>
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input id="searchInput" type="text" placeholder="店名 / 地址 / 省份…" autocomplete="off" />
            <button id="clearSearch" class="clear-btn" title="清除">✕</button>
          </div>
        </section>

        <!-- Filters -->
        <section class="card">
          <div class="card-header-row">
            <h3>筛选条件</h3>
            <button id="resetFilters" class="reset-btn">重置</button>
          </div>
          <div class="filter">
            <label for="gameFilter">游戏类型</label>
            <select id="gameFilter">
              <option value="all">全部</option>
              <option value="maimai">仅 maimai DX</option>
              <option value="chunithm">仅 CHUNITHM</option>
              <option value="both">同时有两种</option>
            </select>
          </div>
          <div class="filter">
            <label for="provinceFilter">省份</label>
            <select id="provinceFilter">
              <option value="all">全部省份</option>
            </select>
          </div>
          <div class="filter">
            <label for="ratingFilter">评分（高德）</label>
            <select id="ratingFilter">
              <option value="all">全部</option>
              <option value="4.5">≥ 4.5</option>
              <option value="4.0">≥ 4.0</option>
              <option value="3.5">≥ 3.5</option>
            </select>
          </div>
          <div class="filter">
            <button id="favFilterBtn" class="fav-filter-btn" aria-pressed="false">♥ 收藏的机厅</button>
          </div>
          <div class="filter">
            <label for="sortFilter">排列方式</label>
            <select id="sortFilter">
              <option value="default">默认（数据顺序）</option>
              <option value="rating_desc">评分高→低</option>
              <option value="rating_asc">评分低→高</option>
              <option value="name_asc">名称 A→Z</option>
            </select>
          </div>
        </section>

        <section class="card stats">
          <h3>总览</h3>
          <div class="stat">
            <span class="stat-label">总店铺</span>
            <span class="stat-value" id="statTotal">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">maimai DX</span>
            <span class="stat-value" id="statMaimai">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">CHUNITHM</span>
            <span class="stat-value" id="statChunithm">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">双机厅</span>
            <span class="stat-value" id="statBoth">-</span>
          </div>
        </section>

        <!-- 省份 SEO 入口 -->
        <section class="card provinces-nav">
          <h3>省份地图</h3>
          <div class="province-links" id="provinceLinks"></div>
        </section>

        <!-- 最近浏览 -->
        <section class="card" id="recentSection" style="display:none">
          <div class="card-header-row">
            <h3>最近浏览</h3>
            <button id="clearRecentBtn" class="reset-btn">清除</button>
          </div>
          <div class="recent-list"></div>
        </section>

        <section class="card list">
          <div class="card-header-row">
            <h3>店铺列表</h3>
            <span id="listCounter" class="list-counter"></span>
            <button id="scrollTopBtn" class="scroll-top-btn" title="返回顶部" style="display:none">↑</button>
          </div>
          <div id="shopList"></div>
        </section>
      </aside>

      <!-- 移动端遮罩 -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <section class="map-panel">
        <div id="map"></div>
        <div class="legend">
          <div><span class="dot maimai"></span> maimai DX</div>
          <div><span class="dot chunithm"></span> CHUNITHM</div>
          <div><span class="dot both"></span> 两种都有</div>
        </div>
        <!-- 移动端浮动按钮：展开侧边栏 -->
        <button class="fab-sidebar" id="fabSidebar" aria-label="打开筛选">
          ☰
        </button>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
  <script src="data/locations.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
