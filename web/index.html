<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>maimai / CHUNITHM 店铺地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载店铺数据…</div>
    </div>
  </div>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">Arcade Map</div>
        <div class="subtitle">maimai DX · CHUNITHM · 全国店铺地图</div>
      </div>
      <div class="header-right">
        <div class="status">
          <span class="status-dot"></span>
          数据来源：Wahlap + 高德地图
        </div>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <!-- Search -->
        <section class="card">
          <h3>搜索店铺</h3>
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input id="searchInput" type="text" placeholder="店名 / 地址 / 省份…" autocomplete="off" />
            <button id="clearSearch" class="clear-btn" title="清除">✕</button>
          </div>
        </section>

        <!-- Filters -->
        <section class="card">
          <div class="card-header-row">
            <h3>筛选条件</h3>
            <button id="resetFilters" class="reset-btn">重置</button>
          </div>
          <div class="filter">
            <label for="gameFilter">游戏类型</label>
            <select id="gameFilter">
              <option value="all">全部</option>
              <option value="maimai">仅 maimai DX</option>
              <option value="chunithm">仅 CHUNITHM</option>
              <option value="both">同时有两种</option>
            </select>
          </div>
          <div class="filter">
            <label for="provinceFilter">省份</label>
            <select id="provinceFilter">
              <option value="all">全部省份</option>
            </select>
          </div>
          <div class="filter">
            <label for="ratingFilter">评分（高德）</label>
            <select id="ratingFilter">
              <option value="all">全部</option>
              <option value="4.5">≥ 4.5</option>
              <option value="4.0">≥ 4.0</option>
              <option value="3.5">≥ 3.5</option>
            </select>
          </div>
        </section>

        <section class="card stats">
          <h3>总览</h3>
          <div class="stat">
            <span class="stat-label">总店铺</span>
            <span class="stat-value" id="statTotal">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">maimai DX</span>
            <span class="stat-value" id="statMaimai">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">CHUNITHM</span>
            <span class="stat-value" id="statChunithm">-</span>
          </div>
          <div class="stat">
            <span class="stat-label">双机厅</span>
            <span class="stat-value" id="statBoth">-</span>
          </div>
        </section>

        <section class="card list">
          <div class="card-header-row">
            <h3>店铺列表</h3>
            <span id="listCounter" class="list-counter"></span>
          </div>
          <div id="shopList"></div>
        </section>
      </aside>

      <section class="map-panel">
        <div id="map"></div>
        <div class="legend">
          <div><span class="dot maimai"></span> maimai DX</div>
          <div><span class="dot chunithm"></span> CHUNITHM</div>
          <div><span class="dot both"></span> 两种都有</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
